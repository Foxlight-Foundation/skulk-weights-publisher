# Legacy single-manifest copy of the Foxlight vindex catalogue.
#
# The product CLI loads the packaged Foxlight catalogue from
# src/skulk_weights_publisher/catalogues/foxlight.yaml by default and exposes
# keys under the `foxlight/` namespace. Keep this file for older automation that
# still calls `skulk-weights --manifest models.yaml ...`.
#
# Fields:
# - key: stable workflow selector
# - source_model: upstream HuggingFace model id consumed by LARQL extraction
# - quant: target vindex quantization
# - tier: smoke for scheduled publication, moe for manual large-model publication
# - slices: LARQL slice presets to publish for this model
# - output_name: local output directory basename
# - hf_repo: target HuggingFace repo id for the published vindex
# - hf_collection: Hugging Face collection that lists the published repo

models:
  - key: gemma-3-4b-full-q4-k
    source_model: google/gemma-3-4b-it
    quant: q4k
    tier: smoke
    slices:
      - full
    output_name: gemma-3-4b-it-full-q4-k.vindex
    hf_repo: FoxlightAI/gemma-3-4b-it-full-q4-k-vindex
    hf_collection: FoxlightAI/vindexes-6a124406dd5fb439c431b051

  - key: llama-3-2-3b-full-q4-k
