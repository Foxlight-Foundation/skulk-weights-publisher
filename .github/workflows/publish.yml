name: Publish vindexes

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      model:
        description: "Catalog key to publish, or 'all'"
        required: true
        default: all
      catalog_config:
        description: "Optional skulk-weights.yaml path for operator catalog sources"
        required: false
        default: ""
      tier:
        description: "Tier used when model is 'all'"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - moe
          - all
      dry_run:
        description: "Print commands without extracting or publishing"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

jobs:
  validate:
    name: Validate catalog and dry runs
    runs-on: ubuntu-latest
    env:
      CATALOG_CONFIG: ${{ github.event.inputs.catalog_config || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint Python
        run: ruff check

      - name: Type check Python
        run: basedpyright

      - name: Run unit tests
        run: pytest

      - name: Lint shell wrappers
        run: bash -n scripts/doctor.sh scripts/publish-weights.sh scripts/publish-vindex.sh

      - name: Validate catalog
        shell: bash
        run: |
          set -euo pipefail
          catalog_args=()
          if [ -n "$CATALOG_CONFIG" ]; then
            catalog_args=(--config "$CATALOG_CONFIG")
          fi
          skulk-weights "${catalog_args[@]}" catalog validate

      - name: Dry-run every catalog entry
        shell: bash
        run: |
          set -euo pipefail
          catalog_args=()
          if [ -n "$CATALOG_CONFIG" ]; then
            catalog_args=(--config "$CATALOG_CONFIG")
          fi
          skulk-weights "${catalog_args[@]}" catalog list --tier all | while IFS= read -r key; do
            [ -n "$key" ] || continue
            scripts/publish-weights.sh "${catalog_args[@]}" --model "$key" --dry-run
          done

  publish:
    name: Publish selected vindexes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: validate
    runs-on: [self-hosted, linux, larql, vindex]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      SKULK_WEIGHTS_SCRATCH: ${{ vars.SKULK_WEIGHTS_SCRATCH || format('{0}/.scratch', github.workspace) }}
      SKULK_WEIGHTS_COLLECTION: ${{ vars.SKULK_WEIGHTS_COLLECTION || '' }}
      CATALOG_CONFIG: ${{ github.event.inputs.catalog_config || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          catalog_args=()
          if [ -n "$CATALOG_CONFIG" ]; then
            catalog_args=(--config "$CATALOG_CONFIG")
          fi
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            scripts/doctor.sh "${catalog_args[@]}"
          else
            scripts/doctor.sh "${catalog_args[@]}" --publish
          fi

      - name: Resolve publish list
        id: models
        shell: bash
        run: |
          set -euo pipefail
          catalog_args=()
          if [ -n "$CATALOG_CONFIG" ]; then
            catalog_args=(--config "$CATALOG_CONFIG")
          fi
          requested="${{ github.event.inputs.model || 'all' }}"
          tier="${{ github.event.inputs.tier || 'smoke' }}"
          if [ "$requested" = "all" ]; then
            {
              echo "keys<<EOF"
              skulk-weights "${catalog_args[@]}" catalog list --tier "$tier"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            skulk-weights "${catalog_args[@]}" catalog show "$requested" >/dev/null
            {
              echo "keys<<EOF"
              echo "$requested"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish selected vindexes
        shell: bash
        env:
          MODEL_KEYS: ${{ steps.models.outputs.keys }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          catalog_args=()
          if [ -n "$CATALOG_CONFIG" ]; then
            catalog_args=(--config "$CATALOG_CONFIG")
          fi
          printf '%s\n' "$MODEL_KEYS" | while IFS= read -r key; do
            [ -n "$key" ] || continue
            # Scope to vindex only — MTP extraction requires mlx (macOS) and is
            # run separately via an explicit --artifact mtp invocation on a
            # Mac runner with HF_TOKEN and the [mtp] extras installed.
            args=(--model "$key" --artifact vindex)
            if [ "$DRY_RUN" = "true" ]; then
              args+=(--dry-run)
            fi
            scripts/publish-weights.sh "${catalog_args[@]}" "${args[@]}"
          done
